name: Build and Test
on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build-and-test-linux:
    strategy:
      fail-fast: true

    runs-on:
      - ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: install nix
        uses: nixbuild/nix-quick-install-action@v30

      - name: nix cache
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}

      - name: set up nix shell
        run: nix-shell --command 'true'

      - name: make
        run: nix-shell --command 'make'

      - name: make test
        run: nix-shell --command 'make test'

      - name: build end-to-end test runner
        run: nix-shell --command 'make -C test-programs runner'

      - name: end-to-end tests
        run: nix-shell --command 'test-programs/austral-test-runner'

      - name: examples
        run: nix-shell --command 'bash run-examples.sh'

      - name: build the stdlib
        run: nix-shell --command 'make -C standard clean && make -C standard'

      - name: test the stdlib
        run: nix-shell --command './standard/test_bin'

      - name: upload compiler binary
        uses: actions/upload-artifact@v4
        with:
          name: austral-linux-bin
          path: austral
          retention-days: 14

      - name: clean
        run: make clean

      - name: assert executable does not exist
        run: test ! -f austral

  build-and-test-linux-opam:
    strategy:
      fail-fast: true

    runs-on:
      - ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang gcc libgmp-dev m4 pkg-config python3

      - name: install ocaml
        uses: ocaml/setup-ocaml@v2
        with:
          ocaml-compiler: 5.2.1

      - name: install dependencies
        run: |
          eval $(opam env)
          opam install --deps-only --with-test -y .

      - name: make
        run: |
          eval $(opam env)
          make

      - name: make test
        run: |
          eval $(opam env)
          make test

      - name: build end-to-end test runner
        run: |
          eval $(opam env)
          make -C test-programs runner

      - name: end-to-end tests with gcc
        run: |
          eval $(opam env)
          AUSTRAL_CC=gcc test-programs/austral-test-runner

      - name: end-to-end tests with clang
        run: |
          eval $(opam env)
          AUSTRAL_CC=clang test-programs/austral-test-runner

      - name: examples
        run: |
          eval $(opam env)
          bash run-examples.sh

      - name: build the stdlib
        run: |
          eval $(opam env)
          make -C standard clean
          make -C standard

      - name: test the stdlib
        run: ./standard/test_bin

  build-docker-image:
    strategy:
      fail-fast: true

    runs-on:
      - ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: austral:ci

      - name: run compiler
        run: docker run --rm austral:ci --version
